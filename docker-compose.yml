services:
  api:
    image: alaasmagi/restaurant-booking-api:latest
    build:
      context: ./restaurant-booking-api
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin-password}
      SERVER_PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/restaurant.db
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - api-data:/data

  client:
    image: alaasmagi/restaurant-booking-client:latest
    build:
      context: ./restaurant-booking-client
      args:
        VITE_API_URL: /api
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  api-data:
